spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: paseador-service
              uri: http://localhost:8082
              predicates:
                - Path=/api/paseadores/**
            - id: tutores-service
              uri: http://localhost:8081
              predicates:
                - Path=/api/**

server:
  port: 8080

jwt:
  secret: patiperro-dev-secret-key-should-be-long-and-random-2026

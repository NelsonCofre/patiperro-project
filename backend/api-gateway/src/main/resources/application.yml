spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: mascotas-service
              uri: http://localhost:8083
              predicates:
                - Path=/api/mascotas/**
            - id: paseadores-service
              uri: http://localhost:8082
              predicates:
                - Path=/api/paseadores/**
            # Login/registro/logout tutor: /api/auth/tutores (subida de foto usa /api/tutores/auth/...).
            - id: tutores-auth-service
              uri: http://localhost:8081
              predicates:
                - Path=/api/auth/tutores/**
            - id: tutores-service
              uri: http://localhost:8081
              predicates:
                - Path=/api/tutores/**

server:
  port: 8080

jwt:
  secret: patiperro-dev-secret-key-should-be-long-and-random-2026

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            # Agenda + bloqueos-día + catálogos (JWT vía cookie/Authorization propagada al 8084).
            - id: agenda-service
              uri: http://localhost:8084
              predicates:
                - Path=/api/agenda/**
            # Blackout paseador (mismo agenda-service; no confundir con paseadores-service).
            - id: walker-agenda-routes
              uri: http://localhost:8084
              predicates:
                - Path=/api/walker/**
            - id: mascotas-service
              uri: http://localhost:8083
              predicates:
                - Path=/api/mascotas/**
            - id: paseadores-service
              uri: http://localhost:8082
              predicates:
                - Path=/api/paseadores/**
            - id: reserva-service
              uri: http://localhost:8085
              predicates:
                - Path=/api/reserva/**
            - id: reserva-bookings-query
              uri: http://localhost:8085
              predicates:
                - Path=/api/tutor/**,/api/bookings/**
            - id: reserva-plural-routes
              uri: http://localhost:8085
              predicates:
                - Path=/api/reservas/**
            # Login/registro/logout tutor: /api/auth/tutores (subida de foto usa /api/tutores/auth/...).
            - id: tutores-auth-service
              uri: http://localhost:8081
              predicates:
                - Path=/api/auth/tutores/**
            - id: tutores-service
              uri: http://localhost:8081
              predicates:
                - Path=/api/tutores/**
            # notification-service (plantillas, envíos, eventos; no exponer /internal/** aquí).
            - id: notification-service
              uri: http://localhost:8086
              predicates:
                - Path=/api/notificaciones/**

server:
  port: 8080

jwt:
  secret: patiperro-dev-secret-key-should-be-long-and-random-2026

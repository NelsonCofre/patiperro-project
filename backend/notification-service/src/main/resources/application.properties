spring.application.name=notification-service
server.port=8086

# Nombre de la base de datos que creaste en pgAdmin
spring.datasource.url=jdbc:postgresql://localhost:5432/patiperro_notifications
# Usuario por defecto
spring.datasource.username=postgres
# La contraseña que elegiste al instalar
spring.datasource.password=root

# Configuración de Hibernate para que cree las tablas automáticamente
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Configuración de Brevo SMTP
spring.mail.host=smtp-relay.brevo.com
spring.mail.port=587
spring.mail.username=a78dc2001@smtp-brevo.com

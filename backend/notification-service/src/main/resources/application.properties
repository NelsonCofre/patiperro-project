# =============================================================================
# notification-service — paso 13: preferir variables de entorno en despliegue.
# Alinear NOTIFICATION_INTERNO_SECRET con pagos/reserva; mismo tope HTML que pagos si personalizás tamaño.
# =============================================================================

spring.application.name=notification-service
# Desarrollo local: perfil dev. Producción: SPRING_PROFILES_ACTIVE=prod (application-prod.properties).
spring.profiles.active=dev
server.port=8086

# Secreto compartido (cabecera X-Patiperro-Interno-Secret) para /internal/paseo/** y /internal/pagos/**.
# Debe coincidir con patiperro.pagos.integracion.notification.interno.secret y reserva notificacion*.
patiperro.notification.interno.secret=${NOTIFICATION_INTERNO_SECRET:patiperro-notification-interno-dev-2026}

# Template Brevo (ID numérico en el panel) para correo "pago confirmado" al paseador
patiperro.notification.brevo.template.PAGO_CONFIRMADO=4
patiperro.notification.brevo.template.REEMBOLSO_RESERVA=5
# Plantilla Brevo para RESUMEN_COMPROBANTE_TUTOR (variable params.cuerpoHtml sin escapar en el editor).
patiperro.notification.brevo.template.RESUMEN_COMPROBANTE_TUTOR=6
# Consolidado al paseador tras batch liberación (variables: mensaje, montoTotalNeto, cantidadReservasLiberadas, idUsuarioPaseador). Default 4 = misma plantilla que PAGO_CONFIRMADO hasta crear una dedicada.
patiperro.notification.brevo.template.LIBERACION_FONDOS_CONSOLIDADA_PASEADOR=${NOTIFICATION_BREVO_TEMPLATE_LIBERACION_CONSOLIDADA:4}

# POST /internal/pagos/reembolso-procesado (correo tutor, evento REEMBOLSO_RESERVA; usa la misma plantilla que arriba).
patiperro.notification.reembolso-procesado.enabled=true

# POST /internal/pagos/liberacion-fondos-consolidada-paseador — si false responde 503 (misma idea que resumen).
patiperro.notification.liberacion-fondos-consolidada-paseador.enabled=true

# POST /internal/pagos/resumen-comprobante-tutor — si false responde 503 (pagos-service no marca correo enviado).
patiperro.notification.resumen-comprobante-tutor.enabled=true
# Segunda línea de defensa; mismo límite que pagos (cualquiera de las dos env puede definir el valor efectivo).
patiperro.notification.resumen-comprobante-tutor.max-html-chars=${NOTIFICATION_RESUMEN_COMPROBANTE_MAX_HTML_CHARS:${PAGOS_INTEGRACION_NOTIFICATION_MAX_HTML_CHARS:200000}}

# Nombre de la base de datos que creaste en pgAdmin
spring.datasource.url=jdbc:postgresql://localhost:5432/patiperro_notifications
# Usuario por defecto
spring.datasource.username=postgres
# La contraseña que elegiste al instalar
#root#
spring.datasource.password=root

# Hibernate: esquema alineado por perfil (dev → update; prod → validate en application-prod.properties).
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# --- Brevo API transactional (plantillas POST /v3/smtp/email vía NotificationService; no hardcodear en código) ---
patiperro.notification.brevo.transactional.base-url=${NOTIFICATION_BREVO_TRANSACTIONAL_BASE_URL:https://api.brevo.com/v3/smtp/email}
# Prod: definir NOTIFICATION_BREVO_TRANSACTIONAL_API_KEY; el default es solo desarrollo local.
patiperro.notification.brevo.transactional.api-key=${NOTIFICATION_BREVO_TRANSACTIONAL_API_KEY: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}

# Configuración de Brevo SMTP (JavaMail)
spring.mail.host=smtp-relay.brevo.com
spring.mail.port=587
spring.mail.username=${NOTIFICATION_BREVO_SMTP_USERNAME:a78dc2001@smtp-brevo.com}
spring.mail.password=${NOTIFICATION_BREVO_SMTP_PASSWORD:xsmtpsib-4f2b9394c1e8e2c487ebac8c583cad42653e758584f0c9f81f7dfb1af77e6a53-RqPpjvI3Rdx4LrE0}

# Protocolo de seguridad
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# --- Actuator / métricas ---
management.endpoints.access.default=none
management.endpoint.health.access=read-only
management.endpoint.metrics.access=read-only
management.endpoint.prometheus.access=read-only
management.endpoints.web.exposure.include=health,metrics,prometheus
management.metrics.tags.application=${spring.application.name}
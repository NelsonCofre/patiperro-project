# Producción: arrancar con SPRING_PROFILES_ACTIVE=prod (sobrescribe spring.profiles.active del fichero base).
# Sin defaults de desarrollo en secretos; definir variables en el entorno de despliegue.
# Tabla push_suscripcion: ejecutar src/main/resources/db/push_suscripcion-ddl.sql en patiperro_notifications antes del primer arranque.
#
# Secretos obligatorios: JWT_SECRET, NOTIFICATION_INTERNO_SECRET (alineado con pagos/reserva/chat).
# Web Push (opcional): NOTIFICATION_WEBPUSH_ENABLED=true, VAPID_PUBLIC_KEY, VAPID_PRIVATE_KEY, VAPID_SUBJECT.
# chat-service: CHAT_INTEGRACION_NOTIFICATION_ENABLED, CHAT_INTEGRACION_NOTIFICATION_BASE_URL (URL interna a este servicio).

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.mail.properties.mail.debug=false

jwt.secret=${JWT_SECRET}

# Sin default dev: forzar NOTIFICATION_INTERNO_SECRET en el entorno de despliegue.
patiperro.notification.interno.secret=${NOTIFICATION_INTERNO_SECRET}

patiperro.notification.webpush.enabled=${NOTIFICATION_WEBPUSH_ENABLED:false}
patiperro.notification.webpush.vapid.public-key=${VAPID_PUBLIC_KEY:}
patiperro.notification.webpush.vapid.private-key=${VAPID_PRIVATE_KEY:}
patiperro.notification.webpush.vapid.subject=${VAPID_SUBJECT:mailto:soporte@patiperro.cl}

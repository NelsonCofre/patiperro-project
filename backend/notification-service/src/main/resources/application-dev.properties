# Perfil dev (activo por defecto vía spring.profiles.active=dev en application.properties).
# Secretos locales: preferir ${workspaceFolder}/.env (ver .vscode/launch.json).

spring.jpa.show-sql=true
spring.mail.properties.mail.debug=true

# JWT — misma clave que gateway / tutores / paseadores / pagos en local.
jwt.secret=${JWT_SECRET:patiperro-dev-secret-key-should-be-long-and-random-2026}

# Web Push (chat). En .env: VAPID_PUBLIC_KEY, VAPID_PRIVATE_KEY; opcional NOTIFICATION_WEBPUSH_ENABLED=true.
# En chat-service: CHAT_INTEGRACION_NOTIFICATION_ENABLED=true para disparar push al enviar mensaje.
patiperro.notification.webpush.enabled=${NOTIFICATION_WEBPUSH_ENABLED:false}
patiperro.notification.webpush.vapid.public-key=${VAPID_PUBLIC_KEY:}
patiperro.notification.webpush.vapid.private-key=${VAPID_PRIVATE_KEY:}
patiperro.notification.webpush.vapid.subject=${VAPID_SUBJECT:mailto:soporte@patiperro.cl}

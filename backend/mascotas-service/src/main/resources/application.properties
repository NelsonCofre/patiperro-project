# =============================================================================
# mascotas-service — desarrollo local (prod: application-prod.properties + SPRING_PROFILES_ACTIVE=prod)
# =============================================================================

spring.application.name=mascotas-service
server.port=${MASCOTAS_SERVICE_PORT:8083}

spring.datasource.url=${MASCOTAS_DB_URL:jdbc:postgresql://localhost:5432/mascotas_db}
spring.datasource.username=${MASCOTAS_DB_USER:postgres}
spring.datasource.password=${MASCOTAS_DB_PASSWORD:12345}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# JWT tutor (mismo secreto HS256 que gateway / pagos / chat en dev)
jwt.secret=${JWT_SECRET:patiperro-dev-secret-key-should-be-long-and-random-2026}
jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}

# Integración reserva-service (cabecera X-Patiperro-Interno-Secret)
patiperro.mascotas.interno.secret=${MASCOTAS_INTERNO_SECRET:patiperro-mascotas-interno-dev-2026}

# Multipart foto de perfil (criterio HU: 5 MB)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB

patiperro.mascotas.foto.upload-dir=${MASCOTAS_FOTO_UPLOAD_DIR:uploads/mascota-perfil}
patiperro.mascotas.foto.max-bytes=${MASCOTAS_FOTO_MAX_BYTES:5242880}

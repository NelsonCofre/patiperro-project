# =============================================================================
# mascotas-service — CRUD mascotas y foto de perfil (multipart local).
# Desarrollo local: este archivo. Producción: SPRING_PROFILES_ACTIVE=prod.
# =============================================================================

spring.application.name=mascotas-service
server.port=8083

# --- CONFIGURACIÓN POSTGRESQL ---
spring.datasource.url=jdbc:postgresql://localhost:5432/mascotas_db
spring.datasource.username=postgres
#root#
spring.datasource.password=12345
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ddl-auto=update para que no borre tus datos de pgAdmin al reiniciar
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# --- SEGURIDAD JWT ---
jwt.secret=patiperro-dev-secret-key-should-be-long-and-random-2026
jwt.expiration-ms=3600000

# Secreto compartido con reserva-service (cabecera X-Patiperro-Interno-Secret) para portada de mascota.
patiperro.mascotas.interno.secret=patiperro-mascotas-interno-reserva-dev-2026

# --- FOTO DE PERFIL DE MASCOTA (multipart, almacenamiento local; criterio: máx. 5 MB) ---
# Multipart Spring: límite de archivo = 5 MB; request ligeramente mayor por boundaries (como chat 10/11 MB).
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB
patiperro.mascotas.foto.upload-dir=${MASCOTAS_FOTO_UPLOAD_DIR:uploads/mascota-perfil}
patiperro.mascotas.foto.max-bytes=${MASCOTAS_FOTO_MAX_BYTES:5242880}

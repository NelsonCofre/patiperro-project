# Producción: SPRING_PROFILES_ACTIVE=prod
# Sobrescribe secretos del application.properties de desarrollo. Definir en el entorno:
#   JWT_SECRET, MASCOTAS_DB_URL, MASCOTAS_DB_USER, MASCOTAS_DB_PASSWORD,
#   MASCOTAS_INTERNO_SECRET (mismo valor que reserva-service),
#   MASCOTAS_FOTO_UPLOAD_DIR (volumen persistente).

# --- Base de datos (patrón chat-service / notification-service) ---
spring.datasource.url=${MASCOTAS_DB_URL:jdbc:postgresql://localhost:5432/mascotas_db}
spring.datasource.username=${MASCOTAS_DB_USER:postgres}
spring.datasource.password=${MASCOTAS_DB_PASSWORD:}

spring.jpa.show-sql=false

# --- JWT tutor (compartido con gateway; variable JWT_SECRET) ---
jwt.secret=${JWT_SECRET:}
jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}

# --- Integración reserva-service (cabecera X-Patiperro-Interno-Secret) ---
patiperro.mascotas.interno.secret=${MASCOTAS_INTERNO_SECRET:}

# --- Multipart foto de perfil (criterio HU: 5 MB; gateway/nginx: client_max_body_size >= 6m) ---
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB

# --- Almacenamiento local (como CHAT_MEDIA_UPLOAD_DIR en chat-service) ---
patiperro.mascotas.foto.upload-dir=${MASCOTAS_FOTO_UPLOAD_DIR:/var/patiperro/mascota-perfil}
patiperro.mascotas.foto.max-bytes=${MASCOTAS_FOTO_MAX_BYTES:5242880}

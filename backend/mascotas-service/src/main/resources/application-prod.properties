# Producción: SPRING_PROFILES_ACTIVE=prod. Secretos y rutas sensibles vía variables de entorno.

# --- Foto de perfil de mascota ---
# MASCOTAS_FOTO_UPLOAD_DIR — ruta absoluta con volumen persistente (las imágenes no deben perderse al reiniciar).
# MASCOTAS_FOTO_MAX_BYTES — opcional; si no se define, hereda 5242880 (5 MB) del fichero base.
# Proxy delante del gateway: límite de body >= 6 MB para PATCH/POST multipart de una imagen.
patiperro.mascotas.foto.upload-dir=${MASCOTAS_FOTO_UPLOAD_DIR:/var/patiperro/mascota-perfil}
patiperro.mascotas.foto.max-bytes=${MASCOTAS_FOTO_MAX_BYTES:5242880}

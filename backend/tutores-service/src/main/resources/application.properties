spring.application.name=tutores-service
server.port=${TUTORES_SERVICE_PORT:8081}

# PostgreSQL
spring.datasource.url=${TUTORES_DB_URL:jdbc:postgresql://localhost:5432/tutores_db}
spring.datasource.username=${TUTORES_DB_USER:postgres}
spring.datasource.password=${TUTORES_DB_PASSWORD:12345}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# JWT (misma clave HS256 que gateway / otros microservicios en dev)
jwt.secret=${JWT_SECRET:patiperro-dev-secret-key-should-be-long-and-random-2026}
jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

patiperro.geocoding.enabled=true
patiperro.geocoding.nominatim-base-url=https://nominatim.openstreetmap.org
patiperro.geocoding.user-agent=PatiperroApp/1.0 (desarrollo)

# API interna (p. ej. reserva-service obtiene correo del tutor)
patiperro.tutores.interno.secret=${TUTORES_INTERNO_SECRET:patiperro-tutores-interno-dev-2026}

# Registro: validar correo único también en paseadores-service
patiperro.tutores.integracion.paseadores.base-url=${PASEADORES_SERVICE_URL:http://localhost:8082}
patiperro.tutores.integracion.paseadores.interno.secret=${PASEADORES_INTERNO_SECRET:patiperro-paseadores-interno-dev-2026}

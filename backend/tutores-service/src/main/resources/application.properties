spring.application.name=tutores-service
server.port=8081

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/tutores_db
spring.datasource.username=postgres
spring.datasource.password=12345
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# create-drop: al detener la app Hibernate elimina el esquema (parece que no se guarda nada).
# Para conservar datos entre reinicios en local, usa: update
spring.jpa.hibernate.ddl-auto=create-drop

# JWT (misma clave que gateway en desarrollo)
jwt.secret=patiperro-dev-secret-key-should-be-long-and-random-2026
jwt.expiration-ms=3600000

spring.servlet.multipart.max-file-size=3MB
spring.servlet.multipart.max-request-size=3MB
spring.application.name=tutores-service
server.port=8081


# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/tutores_db
spring.datasource.username=${RESERVA_DB_USERNAME:postgres}
spring.datasource.password=12345
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# create-drop: al detener la app Hibernate elimina el esquema (parece que no se guarda nada).
# Para conservar datos entre reinicios en local, usa: update
spring.jpa.hibernate.ddl-auto=update

# JWT (misma clave que gateway en desarrollo)
jwt.secret=patiperro-dev-secret-key-should-be-long-and-random-2026
jwt.expiration-ms=3600000

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

patiperro.geocoding.enabled=true
patiperro.geocoding.nominatim-base-url=https://nominatim.openstreetmap.org
patiperro.geocoding.user-agent=PatiperroApp/1.0 (desarrollo)

# Llamadas servidor-a-servidor (p. ej. reserva-service obtiene correo del tutor). Debe coincidir con patiperro.reserva.tutores-interno.secret.
patiperro.tutores.interno.secret=patiperro-tutores-interno-dev-2026

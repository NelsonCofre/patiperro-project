# Perfil producción: activar con spring.profiles.active=prod
# Ajustar variables de entorno en el despliegue; no commitear secretos.

# No exponer la especificación OpenAPI ni Swagger UI.
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# Evitar ejecutar data.sql en cada arranque en entornos gestionados (usar migraciones Flyway/Liquibase si aplica).
spring.sql.init.mode=never

# Cuando existan migraciones versionadas, valorar spring.jpa.hibernate.ddl-auto=validate aquí o en el despliegue.
# spring.jpa.hibernate.ddl-auto=validate

# p. ej. false si un solo nodo corre el scheduler, o añadís lock (ShedLock).
# patiperro.reserva.aceptada-mantenimiento.enabled=true

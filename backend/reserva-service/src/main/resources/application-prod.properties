# Perfil producción: arrancar con SPRING_PROFILES_ACTIVE=prod (sobrescribe spring.profiles.active del fichero base).
# Definir secretos solo por variables de entorno en el despliegue; no commitear valores reales.

springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

spring.sql.init.mode=never
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true

management.endpoints.web.exposure.include=health,metrics,prometheus
management.endpoint.health.probes.enabled=true
management.metrics.tags.application=${spring.application.name}

# --- Reembolso MP / jobs (paridad con dev: definir URL y secretos vía entorno; no placeholders inseguros) ---
# PAGOS_SERVICE_URL, PAGOS_INTERNO_SECRET — mismo secreto que patiperro.pagos.integracion.reserva.interno.secret en pagos-service.
# NOTIFICATION_INTERNO_SECRET — alineado con notification-service.
# Activar reenvío de correo tutor solo si notification-service está operativo:
# patiperro.reserva.notificacion-reembolso.scheduler.enabled=true
# Opcional: pausa entre ítems en reconciliación (throttling hacia MP), p. ej. 200–500 ms.
# patiperro.reserva.reembolso.reconciliacion.scheduler.pause-between-items-ms=0
#
# Paso 7: tras desplegar, validar health + un flujo de reserva en staging (mismas variables que prod) antes de tráfico real.
# Perfil producción: arrancar con SPRING_PROFILES_ACTIVE=prod (sobrescribe spring.profiles.active del fichero base).
# Definir secretos solo por variables de entorno en el despliegue; no commitear valores reales.

springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

spring.sql.init.mode=never
spring.jpa.hibernate.ddl-auto=validate

management.endpoints.web.exposure.include=health,metrics,prometheus
management.endpoint.health.probes.enabled=true
management.metrics.tags.application=${spring.application.name}

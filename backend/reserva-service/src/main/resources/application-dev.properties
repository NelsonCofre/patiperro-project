# Perfil dev (activo por defecto en application.properties).
# Esquema: Hibernate create-drop (recrea al arrancar; borra al parar). Flyway desactivado para no duplicar DDL.
# Catálogo estado_reserva: insertar manualmente en la BD si lo necesitas (p. ej. filas de V2__seed_estado_reserva.sql).
spring.jpa.hibernate.ddl-auto=update
spring.flyway.enabled=false
spring.jpa.defer-datasource-initialization=false
spring.sql.init.mode=never

# Menos carga al arrancar: OpenAPI escanea todos los controllers (pon true si necesitas Swagger en dev).
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# Evitar pico de CPU/DB justo tras el arranque: varios @Scheduled tenían initialDelay=0 y competían con Hibernate.
patiperro.reserva.solicitud.expiracion.scheduler.initial-delay-ms=120000
patiperro.reserva.aceptada-mantenimiento.initial-delay-ms=120000

management.endpoints.web.exposure.include=health

# =============================================================================
# reserva-service — Configuración Corregida (Sincronizada con Pagos-Service)
# =============================================================================

spring.application.name=reserva-service
spring.profiles.active=dev
server.port=8085

# --- Base de datos ---
spring.datasource.url=jdbc:postgresql://localhost:5432/reservas_db
spring.datasource.username=${RESERVA_DB_USERNAME:postgres}
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# --- JWT y Seguridad Interna ---
# Este secreto DEBE ser igual al de pagos-service para evitar el error 401
patiperro.reserva.interno.secret=patiperro-reserva-interno-dev-2026
jwt.secret=patiperro-dev-secret-key-should-be-long-and-random-2026

# --- Integración Agenda (8084) ---
patiperro.reserva.agenda-integracion.enabled=true
patiperro.reserva.agenda-integracion.base-url=http://localhost:8084
patiperro.reserva.agenda-interno.secret=patiperro-agenda-interno-dev-2026

# --- Otros Microservicios ---
patiperro.reserva.tutores.base-url=http://localhost:8081
patiperro.reserva.mascotas.base-url=http://localhost:8083
patiperro.reserva.mascotas-interno.secret=patiperro-mascotas-interno-reserva-dev-2026

# --- Lógica de Negocio: Código de Encuentro ---
patiperro.reserva.codigo.validacion-expira-minutos=30
patiperro.reserva.codigo.max-intentos=3
patiperro.reserva.codigo.bloqueo-minutos=5

# --- Paseo / STOMP ---
patiperro.reserva.paseo.efectos-despues-de-commit=true
patiperro.reserva.paseo.bloquear-inicio-sin-codigo=true

# --- Integraciones Opcionales / Notificaciones (8086) ---
patiperro.reserva.integracion.notificacion.enabled=false
patiperro.reserva.integracion.notificacion.base-url=http://localhost:8086
patiperro.reserva.integracion.notificacion.interno.secret=patiperro-notification-interno-dev-2026

# --- INTEGRACIÓN CON PAGOS-SERVICE (8087) ---
# Sincronización para Reembolsos y Vinculación de Checkout
patiperro.reserva.integracion.pagos-reembolso.enabled=true
patiperro.reserva.integracion.pagos-reembolso.base-url=http://localhost:8087
patiperro.reserva.integracion.pagos-reembolso.interno.secret=patiperro-pagos-interno-dev-2026

# Checkout hereda la configuración de reembolso (Asegura comunicación fluida)
patiperro.reserva.integracion.pagos-checkout.enabled=true
patiperro.reserva.integracion.pagos-checkout.base-url=http://localhost:8087
patiperro.reserva.integracion.pagos-checkout.interno.secret=patiperro-pagos-interno-dev-2026

# --- Jobs y Schedulers ---
patiperro.reserva.solicitud.expiracion-aceptacion.horas=24
patiperro.reserva.solicitud.expiracion.scheduler.enabled=true
patiperro.reserva.solicitud.expiracion.scheduler.fixed-delay-ms=300000

# Reintentos de Reembolso
patiperro.reserva.reembolso.retry-delay-ms=400
patiperro.reserva.reembolso.retry-max-delay-ms=15000

# Reconciliación con Mercado Pago
patiperro.reserva.reembolso.reconciliacion.scheduler.enabled=true
patiperro.reserva.reembolso.reconciliacion.scheduler.fixed-delay-ms=600000

# --- Configuración del Sistema ---
spring.task.execution.pool.core-size=2
spring.task.execution.pool.max-size=8
logging.level.com.patiperro.reserva=INFO

# --- Actuator ---
management.endpoints.access.default=none
management.endpoint.health.access=read-only
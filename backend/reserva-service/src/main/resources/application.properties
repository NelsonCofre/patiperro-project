spring.application.name=reserva-service
server.port=${SERVER_PORT:8085}

# Zona horaria del proceso (coherencia con PostgreSQL y timestamps, p. ej. fecha_inicio_real con CURRENT_TIMESTAMP).
user.timezone=${USER_TIMEZONE:UTC}

# reservas_db — en despliegue definir SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME y SPRING_DATASOURCE_PASSWORD (o variables equivalentes de Spring Boot).
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/reserva_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
#12345#
# Contraseña por defecto solo para desarrollo local. En servidores usar variable de entorno (p. ej. SPRING_DATASOURCE_PASSWORD) y no commitear secretos reales.
spring.datasource.password=12345

# El dialecto PostgreSQL lo infiere Hibernate; no hace falta spring.jpa.database-platform.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.defer-datasource-initialization=true
# Ejecuta data.sql al arrancar (ver data.sql). En producción (application-prod.properties) se usa never.
spring.sql.init.mode=always

# Misma clave HS256 que api-gateway / tutores / paseadores / agenda (desarrollo). En producción definir JWT_SECRET.
jwt.secret=${JWT_SECRET:patiperro-dev-secret-key-should-be-long-and-random-2026}

# OpenAPI / Swagger UI: escaneo acotado. En producción se desactivan (application-prod.properties).
springdoc.packages-to-scan=com.patiperro.reserva

# Integración REST con agenda-service (otra BD)
patiperro.reserva.agenda-integracion.enabled=true
patiperro.reserva.agenda-integracion.base-url=http://localhost:8084

patiperro.reserva.tutores.base-url=http://localhost:8081
patiperro.reserva.mascotas.base-url=http://localhost:8083
# Mismo valor que patiperro.mascotas.interno.secret en mascotas-service. En prod preferir variable de entorno si unificáis secretos.
patiperro.reserva.mascotas-interno.secret=${PATIPERRO_MASCOTAS_INTERNO_SECRET:patiperro-mascotas-interno-reserva-dev-2026}

# Mismo valor que patiperro.agenda.interno.secret en agenda-service (PATCH interno marcar-disponible).
patiperro.reserva.agenda-interno.secret=${PATIPERRO_AGENDA_INTERNO_SECRET:patiperro-agenda-interno-dev-2026}

# Ventana de validez del PIN (minutos) desde el inicio programado del paseo (bloque agenda); si ese instante ya pasó, desde "ahora".
patiperro.reserva.codigo.validacion-expira-minutos=30
# Intentos con PIN incorrecto antes de bloqueo temporal; duración del bloqueo (minutos).
patiperro.reserva.codigo.max-intentos=3
patiperro.reserva.codigo.bloqueo-minutos=5
# Cancelación por PIN vencido sin inicio de paseo + relleno de expira si faltó. Varios pods: un solo activo o lock.
patiperro.reserva.aceptada-mantenimiento.enabled=true
# Intervalo mínimo entre ejecuciones (ms) tras la anterior.
patiperro.reserva.aceptada-mantenimiento.fixed-delay-ms=300000

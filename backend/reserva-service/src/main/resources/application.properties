spring.application.name=reserva-service
server.port=8085

#reservas_db#
spring.datasource.url=jdbc:postgresql://localhost:5432/reserva_db
spring.datasource.username=postgres
#12345#
spring.datasource.password=12345
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# Secreto compartido para endpoints internos (/api/reserva/interno/**) vía header X-Patiperro-Interno-Secret
patiperro.reserva.interno.secret=patiperro-reserva-interno-dev-2026

# Misma clave HS256 que api-gateway / tutores / paseadores / agenda (desarrollo)
jwt.secret=patiperro-dev-secret-key-should-be-long-and-random-2026
# Integración REST con agenda-service (otra BD)
patiperro.reserva.agenda-integracion.enabled=true
patiperro.reserva.agenda-integracion.base-url=http://localhost:8084

patiperro.reserva.tutores.base-url=http://localhost:8081
patiperro.reserva.mascotas.base-url=http://localhost:8083
# Mismo valor que patiperro.mascotas.interno.secret en mascotas-service
patiperro.reserva.mascotas-interno.secret=patiperro-mascotas-interno-reserva-dev-2026

# Mismo valor que patiperro.agenda.interno.secret en agenda-service (PATCH interno marcar-disponible).
patiperro.reserva.agenda-interno.secret=patiperro-agenda-interno-dev-2026

# Vigencia del código de encuentro (minutos) desde fecha_aceptacion.
patiperro.reserva.codigo.validacion-expira-minutos=30
patiperro.reserva.codigo.max-intentos=3
patiperro.reserva.codigo.bloqueo-minutos=5

# Confirmación de inicio (seguridad operativa / compatibilidad)
# - efectos-despues-de-commit: evita acoplar STOMP/HTTP a la transacción JPA de la reserva
patiperro.reserva.paseo.efectos-despues-de-commit=true
# - bloquear-inicio-sin-codigo: evita pasar a EN_CURSO vía PATCH si el flujo real es "validar PIN"
#   Ponlo en false si algún cliente legacy aún usa INICIAR_PASEO / idEstadoReserva(EN_CURSO) por PATCH.
patiperro.reserva.paseo.bloquear-inicio-sin-codigo=true

# Integraciones opcionales (off por defecto: no hace calls HTTP a servicios aún inexistentes)
patiperro.reserva.integracion.tracking.enabled=false
patiperro.reserva.integracion.tracking.base-url=
patiperro.reserva.integracion.chat.enabled=false
patiperro.reserva.integracion.chat.base-url=
# notification-service (InternalPaseoController POST /internal/paseo/inicio).
# Secreto = mismo valor que patiperro.notification.interno.secret en notification-service.
patiperro.reserva.integracion.notificacion.enabled=false
patiperro.reserva.integracion.notificacion.base-url=http://localhost:8086
patiperro.reserva.integracion.notificacion.interno.secret=patiperro-notification-interno-dev-2026

# notification-service — evento pago confirmado (POST /internal/pagos/confirmado cuando exista el endpoint).
# Debe coincidir el secreto con notification-service si habilitas esta integración.
patiperro.reserva.integracion.notificacion-pago.enabled=false
patiperro.reserva.integracion.notificacion-pago.base-url=http://localhost:8086
patiperro.reserva.integracion.notificacion-pago.interno.secret=patiperro-notification-interno-dev-2026

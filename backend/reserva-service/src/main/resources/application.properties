# =============================================================================
# reserva-service — configuración por defecto (desarrollo local en placeholders).
# En producción definir variables de entorno; ver application-prod.properties.
# =============================================================================

spring.application.name=reserva-service
# Local: perfil dev (Hibernate create-drop; ver application-dev). Producción: SPRING_PROFILES_ACTIVE=prod.
spring.profiles.active=dev

spring.flyway.locations=classpath:db/migration
# En dev Flyway está desactivado (application-dev); en prod Flyway aplica db/migration.

server.port=8085

# --- Base de datos ---
# Local por defecto; en despliegue usar SPRING_DATASOURCE_URL (convención Boot) o definir spring.datasource.url.
spring.datasource.url=jdbc:postgresql://localhost:5432/reservas_db
spring.datasource.username=${RESERVA_DB_USERNAME:postgres}
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# --- JWT y endpoints internos reserva-service ---
# Usado por pagos-service al llamar /api/reserva/interno/pagos/** — mismo valor en patiperro.pagos.integracion.reserva.interno.secret
patiperro.reserva.interno.secret=${RESERVA_INTERNO_SECRET:patiperro-reserva-interno-dev-2026}
jwt.secret=${JWT_SECRET:patiperro-dev-secret-key-should-be-long-and-random-2026}

# --- Integración agenda ---
patiperro.reserva.agenda-integracion.enabled=true
patiperro.reserva.agenda-integracion.base-url=http://localhost:8084
patiperro.reserva.agenda-interno.secret=${AGENDA_INTERNO_SECRET:patiperro-agenda-interno-dev-2026}

patiperro.reserva.tutores.base-url=http://localhost:8081
patiperro.reserva.mascotas.base-url=http://localhost:8083
patiperro.reserva.mascotas-interno.secret=${MASCOTAS_INTERNO_SECRET:patiperro-mascotas-interno-reserva-dev-2026}

# --- Código de encuentro ---
patiperro.reserva.codigo.validacion-expira-minutos=30
patiperro.reserva.codigo.max-intentos=3
patiperro.reserva.codigo.bloqueo-minutos=5

# --- Paseo / STOMP ---
patiperro.reserva.paseo.efectos-despues-de-commit=true
patiperro.reserva.paseo.bloquear-inicio-sin-codigo=true

# --- Integraciones opcionales ---
patiperro.reserva.integracion.tracking.enabled=false
patiperro.reserva.integracion.tracking.base-url=
patiperro.reserva.integracion.chat.enabled=false
patiperro.reserva.integracion.chat.base-url=

patiperro.reserva.integracion.notificacion.enabled=false
patiperro.reserva.integracion.notificacion.base-url=http://localhost:8086
patiperro.reserva.integracion.notificacion.interno.secret=${NOTIFICATION_INTERNO_SECRET:patiperro-notification-interno-dev-2026}

patiperro.reserva.integracion.notificacion-pago.enabled=false
patiperro.reserva.integracion.notificacion-pago.base-url=http://localhost:8086
patiperro.reserva.integracion.notificacion-pago.interno.secret=${NOTIFICATION_INTERNO_SECRET:patiperro-notification-interno-dev-2026}
patiperro.reserva.integracion.notificacion-pago.connect-timeout-ms=5000
patiperro.reserva.integracion.notificacion-pago.read-timeout-ms=30000

patiperro.reserva.tutores-interno.secret=${TUTORES_INTERNO_SECRET:patiperro-tutores-interno-dev-2026}

# --- Orden de trabajo sugerido (solo backend), pasos 1–4 (resumen) ---
# 1) mercadopago_payment_id: se guarda al marcar PAGADA (ReservaPagoService / webhook interno).
# 2) PAGADA → RECHAZADA: ReservaService programa reembolso tras commit si había cobro.
# 3) Expiración por plazo: mismo criterio si la solicitud expiraba estando PAGADA.
# 4) Resiliencia: patiperro.reserva.reembolso.* y schedulers más abajo (reconciliación / notificación).
# 5) Disparadores reembolso (PDF): PAGADA→RECHAZADA (paseador); PAGADA→EXPIRADA (job plazo); PAGADA→CANCELADA (tutor); siempre tras commit.
# 6) Reconciliación MP + reenvío correo tutor: schedulers; estados vía EstadoReservaCatalogo.IDS_ESTADO_REEMBOLSO_MERCADOPAGO.
# 7) Entornos: application-test.properties (CI sin pagos local); application-prod.properties + env; Testcontainers opcional.

# pagos-service — reembolso MP
patiperro.reserva.integracion.pagos-reembolso.enabled=${RESERVA_INTEGRACION_PAGOS_ENABLED:true}
patiperro.reserva.integracion.pagos-reembolso.base-url=${PAGOS_SERVICE_URL:http://localhost:8087}
patiperro.reserva.integracion.pagos-reembolso.interno.secret=${PAGOS_INTERNO_SECRET:patiperro-pagos-interno-dev-2026}
patiperro.reserva.integracion.pagos-reembolso.connect-timeout-ms=5000
patiperro.reserva.integracion.pagos-reembolso.read-timeout-ms=30000

# Checkout MP (paso 12) — por defecto hereda reembolso; opcional: RESERVA_INTEGRACION_PAGOS_CHECKOUT_*, PAGOS_CHECKOUT_*
patiperro.reserva.integracion.pagos-checkout.enabled=${RESERVA_INTEGRACION_PAGOS_CHECKOUT_ENABLED:${patiperro.reserva.integracion.pagos-reembolso.enabled}}
patiperro.reserva.integracion.pagos-checkout.base-url=${PAGOS_CHECKOUT_SERVICE_URL:${patiperro.reserva.integracion.pagos-reembolso.base-url}}
patiperro.reserva.integracion.pagos-checkout.interno.secret=${PAGOS_CHECKOUT_INTERNO_SECRET:${patiperro.reserva.integracion.pagos-reembolso.interno.secret}}
patiperro.reserva.integracion.pagos-checkout.connect-timeout-ms=${PAGOS_CHECKOUT_CONNECT_TIMEOUT_MS:${patiperro.reserva.integracion.pagos-reembolso.connect-timeout-ms}}
patiperro.reserva.integracion.pagos-checkout.read-timeout-ms=${PAGOS_CHECKOUT_READ_TIMEOUT_MS:${patiperro.reserva.integracion.pagos-reembolso.read-timeout-ms}}

patiperro.reserva.integracion.notificacion-reembolso.enabled=true
patiperro.reserva.integracion.notificacion-reembolso.base-url=http://localhost:8086
patiperro.reserva.integracion.notificacion-reembolso.interno.secret=${NOTIFICATION_INTERNO_SECRET:patiperro-notification-interno-dev-2026}
patiperro.reserva.integracion.notificacion-reembolso.connect-timeout-ms=5000
patiperro.reserva.integracion.notificacion-reembolso.read-timeout-ms=30000

# --- Jobs ---
patiperro.reserva.solicitud.expiracion-aceptacion.horas=24
patiperro.reserva.solicitud.expiracion.scheduler.enabled=true
patiperro.reserva.solicitud.expiracion.scheduler.initial-delay-ms=0
patiperro.reserva.solicitud.expiracion.scheduler.fixed-delay-ms=300000
patiperro.reserva.solicitud.expiracion.scheduler.max-batch-size=100

patiperro.reserva.reembolso.retry-delay-ms=400
# Tope (ms) de la espera entre reintentos ante 429/5xx (backoff exponencial desde retry-delay-ms).
patiperro.reserva.reembolso.retry-max-delay-ms=15000
patiperro.reserva.reembolso.retry-max-extra-attempts=1

patiperro.reserva.reembolso.reconciliacion.scheduler.enabled=true
patiperro.reserva.reembolso.reconciliacion.scheduler.initial-delay-ms=120000
patiperro.reserva.reembolso.reconciliacion.scheduler.fixed-delay-ms=600000
patiperro.reserva.reembolso.reconciliacion.scheduler.max-batch-size=50
# Opcional: espaciar llamadas a pagos-service dentro del mismo tick (0 = sin pausa; p. ej. 100 en picos).
patiperro.reserva.reembolso.reconciliacion.scheduler.pause-between-items-ms=0

# Reenvío correo tutor tras reembolso MP (activar en prod junto a integración notificación-reembolso).
patiperro.reserva.notificacion-reembolso.scheduler.enabled=false
patiperro.reserva.notificacion-reembolso.scheduler.initial-delay-ms=90000
patiperro.reserva.notificacion-reembolso.scheduler.fixed-delay-ms=300000
patiperro.reserva.notificacion-reembolso.scheduler.max-batch-size=30
patiperro.reserva.notificacion-reembolso.scheduler.pause-between-items-ms=0

# --- @Async (reembolso tras commit, etc.) ---
spring.task.execution.pool.core-size=2
spring.task.execution.pool.max-size=8
spring.task.execution.pool.queue-capacity=100

# --- Logging ---
logging.level.com.patiperro.reserva=${LOG_LEVEL_RESERVA:INFO}

# --- Actuator (detalle por perfil; prod expone health) ---
management.endpoints.access.default=none
management.endpoint.health.access=read-only

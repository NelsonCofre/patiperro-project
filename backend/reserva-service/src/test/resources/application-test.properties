# Arranque ligero para @SpringBootTest sin PostgreSQL local (CI / máquinas sin Docker).
spring.datasource.url=jdbc:h2:mem:reservatest;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.flyway.enabled=false
spring.sql.init.mode=never

jwt.secret=test-jwt-secret-key-for-context-load-only-min-chars-2026xxxx
patiperro.reserva.interno.secret=test-reserva-interno-secret

# Jobs desactivados (arranque ligero); en prod activar reconciliación/notificación y variables PAGOS_*/NOTIFICATION_*.
# Paso 7: sin llamadas HTTP reales a pagos/notification durante @SpringBootTest (paridad segura con CI).
patiperro.reserva.integracion.pagos-reembolso.enabled=false
patiperro.reserva.integracion.pagos-comprobante.enabled=false
patiperro.reserva.integracion.notificacion-reembolso.enabled=false
patiperro.reserva.solicitud.expiracion.scheduler.enabled=false
patiperro.reserva.reembolso.reconciliacion.scheduler.enabled=false
patiperro.reserva.notificacion-reembolso.scheduler.enabled=false

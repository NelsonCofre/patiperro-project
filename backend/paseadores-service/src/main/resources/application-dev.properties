# Perfil dev: Flyway aplica migraciones (V1–V3); Hibernate no altera el esquema.
spring.jpa.hibernate.ddl-auto=update
spring.flyway.enabled=false
spring.flyway.locations=classpath:db/migration

# Verificación: límites y upload-dir heredan del fichero base (defaults locales).
# Multipart: max-request-size=12MB en base (2 documentos x 5 MB validados en storage).

# Perfil dev (activo por defecto vía spring.profiles.active=dev): Hibernate ddl-auto=update, Flyway off (pagos/reserva).
spring.jpa.hibernate.ddl-auto=update
spring.flyway.enabled=false

# Verificación: límites y upload-dir heredan del fichero base (defaults locales).

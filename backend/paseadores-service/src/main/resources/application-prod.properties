# Producción: SPRING_PROFILES_ACTIVE=prod (no activar por defecto en local).
# El esquema base de paseadores_db debe existir (p. ej. despliegue previo con Hibernate o script de BD).
spring.jpa.hibernate.ddl-auto=validate

# Flyway: scripts idempotentes; baseline si la BD ya tenía tablas sin flyway_schema_history.
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Secretos y almacenamiento (definir en despliegue; no usar defaults de desarrollo):
# PASEADORES_INTERNO_SECRET — obligatorio; mismo valor que consumen otros microservicios vía cabecera interna.
# PASEADORES_VERIFICACION_UPLOAD_DIR — ruta absoluta con volumen persistente (cédulas no deben perderse al reiniciar).
# PASEADORES_VERIFICACION_MAX_FILE_BYTES — opcional; por defecto 5242880 (5 MB por documento).
# Proxy delante del gateway: límite de body >= 12 MB para POST multipart con frontal + reverso.

# Producción: SPRING_PROFILES_ACTIVE=prod (no activar por defecto en local).
# Definir secretos y rutas sensibles solo por variables de entorno; no usar defaults de desarrollo del fichero base.
# El esquema base de paseadores_db debe existir (p. ej. despliegue previo con Hibernate o script de BD).

spring.jpa.hibernate.ddl-auto=validate

# Flyway: scripts idempotentes; baseline si la BD ya tenía tablas sin flyway_schema_history.
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# --- Verificación de identidad y API interna (obligatorio en despliegue) ---
# PASEADORES_INTERNO_SECRET — mismo valor que consumen otros microservicios (cabecera X-Patiperro-Interno-Secret).
# PASEADORES_VERIFICACION_UPLOAD_DIR — ruta absoluta con volumen persistente (cédulas no deben perderse al reiniciar).
# PASEADORES_VERIFICACION_MAX_FILE_BYTES — opcional; si no se define, hereda 5242880 (5 MB) del fichero base.
# Proxy delante del gateway: límite de body >= 12 MB para POST multipart (cedulaFrontal + cedulaReverso).
patiperro.paseadores.interno.secret=${PASEADORES_INTERNO_SECRET}
patiperro.paseadores.verificacion-identidad.upload-dir=${PASEADORES_VERIFICACION_UPLOAD_DIR}

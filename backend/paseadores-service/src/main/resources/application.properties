spring.application.name=paseadores-service
server.port=8082

# PostgreSQL (crear BD paseadores_db o ajustar URL)
spring.datasource.url=jdbc:postgresql://localhost:5432/paseadores_db
spring.datasource.username=postgres
#root#
spring.datasource.password=12345
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# update: mantiene tablas y datos entre reinicios. create-drop borra el esquema al parar la app (parece que no se guarda nada).
spring.jpa.hibernate.ddl-auto=update
# spring.jpa.show-sql=true

# Flyway aplica db/migration (p. ej. verificación identidad con DEFAULT en filas existentes).
# Hibernate ddl-auto=update no siempre puede ADD COLUMN NOT NULL sin default; Flyway sí.
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Misma clave y expiracion que tutores-service / api-gateway
jwt.secret=patiperro-dev-secret-key-should-be-long-and-random-2026
jwt.expiration-ms=3600000

# API interna (p. ej. pagos-service → correo). En prod definir PASEADORES_INTERNO_SECRET.
patiperro.paseadores.interno.secret=${PASEADORES_INTERNO_SECRET:patiperro-paseadores-interno-dev-2026}

# Multipart global (foto de perfil hasta 10 MB). Verificación identidad valida 5 MB en su storage.
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=11MB

patiperro.paseadores.perfil-foto.max-file-size-bytes=10485760
patiperro.paseadores.verificacion-identidad.max-file-size-bytes=5242880
patiperro.paseadores.verificacion-identidad.upload-dir=uploads/paseador-verificacion

# Geocodificacion (Nominatim). En produccion: user-agent con email de contacto y respetar politica de uso.
patiperro.geocoding.enabled=true
patiperro.geocoding.nominatim-base-url=https://nominatim.openstreetmap.org
patiperro.geocoding.user-agent=PatiperroApp/1.0 (desarrollo)

# URL base de agenda-service (cruce opcional /cercanos). Gateway en prod: http://localhost:8080 no sirve como servidor de agenda.
patiperro.agenda.base-url=http://localhost:8084

# Búsqueda de paseadores cercanos (/api/paseadores/public/cercanos)
# - Si está activo y NO se envía filtro por franja (agenda completo), se filtra por "al menos un bloque disponible desde hoy".
patiperro.paseadores.cercanos.filtrar-disponible-desde-hoy=true
# - Id del estado "Disponible" en catálogo estado_bloque de agenda-service.
patiperro.paseadores.cercanos.id-estado-bloque-disponible=1
# - Limites de prefetch geo (Haversine) para evitar traer demasiadas filas antes de filtrar por agenda.
patiperro.paseadores.cercanos.max-geo-prefetch-con-agenda=2000
patiperro.paseadores.cercanos.max-geo-prefetch-con-conteo=2000



# =============================================================================
# paseadores-service — registro, perfil, búsqueda y verificación de identidad (cédula).
# Desarrollo local: este archivo. Producción: SPRING_PROFILES_ACTIVE=prod.
# =============================================================================

spring.application.name=paseadores-service
# Desarrollo local: perfil dev. Producción: SPRING_PROFILES_ACTIVE=prod.
spring.profiles.active=dev
server.port=8082

# --- Base de datos (paseadores_db; en prod sobrescribir URL/credenciales por entorno) ---
spring.datasource.url=jdbc:postgresql://localhost:5432/paseadores_db
spring.datasource.username=postgres
#root#
spring.datasource.password=12345
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false
# spring.jpa.show-sql=true

# Flyway: ejecutar migraciones tambien en dev para sincronizar columnas nuevas sobre BD locales ya existentes.
# El baseline se configura en FlywayBaselineConfiguration para no romper bases creadas antes con Hibernate.
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# --- JWT (misma clave y expiración que tutores-service / api-gateway) ---
jwt.secret=patiperro-dev-secret-key-should-be-long-and-random-2026
jwt.expiration-ms=3600000

# --- API interna (pagos-service → correo; revisión verificación identidad). En prod: PASEADORES_INTERNO_SECRET obligatorio. ---
patiperro.paseadores.interno.secret=${PASEADORES_INTERNO_SECRET:patiperro-paseadores-interno-dev-2026}

# --- Multipart global (foto de perfil hasta 10 MB). Verificación: 2 archivos x 5 MB (validado en storage). ---
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB

# --- Foto de perfil (registro / me) ---
patiperro.paseadores.perfil-foto.max-file-size-bytes=${PASEADORES_PERFIL_FOTO_MAX_BYTES:10485760}

# --- Verificación de identidad (cédula frontal/reverso; no servir bajo /public) ---
patiperro.paseadores.verificacion-identidad.max-file-size-bytes=${PASEADORES_VERIFICACION_MAX_FILE_BYTES:5242880}
patiperro.paseadores.verificacion-identidad.upload-dir=${PASEADORES_VERIFICACION_UPLOAD_DIR:uploads/paseador-verificacion}

# --- Geocodificación (Nominatim). En producción: user-agent con email de contacto. ---
patiperro.geocoding.enabled=true
patiperro.geocoding.nominatim-base-url=https://nominatim.openstreetmap.org
patiperro.geocoding.user-agent=PatiperroApp/1.0 (desarrollo)

# --- Integración agenda-service (cruce opcional /cercanos). Gateway en prod: usar URL del servicio real. ---
patiperro.agenda.base-url=http://localhost:8084

# --- Búsqueda de paseadores cercanos (/api/paseadores/public/cercanos) ---
patiperro.paseadores.cercanos.filtrar-disponible-desde-hoy=true
patiperro.paseadores.cercanos.id-estado-bloque-disponible=1
patiperro.paseadores.cercanos.max-geo-prefetch-con-agenda=2000
patiperro.paseadores.cercanos.max-geo-prefetch-con-conteo=2000

# =============================================================================
# paseadores-service — registro, perfil, búsqueda y verificación de identidad (cédula).
# Desarrollo local: este archivo + perfil dev. Producción: SPRING_PROFILES_ACTIVE=prod.
# =============================================================================

spring.application.name=paseadores-service
spring.profiles.active=dev
server.port=${PASEADORES_SERVICE_PORT:8082}

# --- Base de datos (paseadores_db) ---
spring.datasource.url=${PASEADORES_DB_URL:jdbc:postgresql://localhost:5432/paseadores_db}
spring.datasource.username=${PASEADORES_DB_USER:postgres}
spring.datasource.password=${PASEADORES_DB_PASSWORD:12345}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# --- JWT (misma clave y expiración que tutores-service / api-gateway) ---
jwt.secret=${JWT_SECRET:patiperro-dev-secret-key-should-be-long-and-random-2026}
jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}

# --- API interna (pagos-service → correo; revisión verificación identidad) ---
patiperro.paseadores.interno.secret=${PASEADORES_INTERNO_SECRET:patiperro-paseadores-interno-dev-2026}

# Registro: validar correo único también en tutores-service
patiperro.paseadores.integracion.tutores.base-url=${TUTORES_SERVICE_URL:http://localhost:8081}
patiperro.paseadores.integracion.tutores.interno.secret=${TUTORES_INTERNO_SECRET:patiperro-tutores-interno-dev-2026}

# --- Multipart global (foto de perfil hasta 10 MB). Verificación: 2 archivos x 5 MB (validado en storage). ---
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB

# --- Foto de perfil (registro / me) ---
patiperro.paseadores.perfil-foto.max-file-size-bytes=${PASEADORES_PERFIL_FOTO_MAX_BYTES:10485760}

# --- Verificación de identidad (cédula frontal/reverso) ---
patiperro.paseadores.verificacion-identidad.max-file-size-bytes=${PASEADORES_VERIFICACION_MAX_FILE_BYTES:5242880}
patiperro.paseadores.verificacion-identidad.upload-dir=${PASEADORES_VERIFICACION_UPLOAD_DIR:uploads/paseador-verificacion}

# --- Geocodificación (Nominatim) ---
patiperro.geocoding.enabled=true
patiperro.geocoding.nominatim-base-url=https://nominatim.openstreetmap.org
patiperro.geocoding.user-agent=PatiperroApp/1.0 (desarrollo)

# --- Integración agenda-service (cruce opcional /cercanos) ---
patiperro.agenda.base-url=${AGENDA_SERVICE_URL:http://localhost:8084}

# --- Búsqueda de paseadores cercanos (/api/paseadores/public/cercanos) ---
patiperro.paseadores.cercanos.filtrar-disponible-desde-hoy=true
patiperro.paseadores.cercanos.id-estado-bloque-disponible=1
patiperro.paseadores.cercanos.max-geo-prefetch-con-agenda=2000
patiperro.paseadores.cercanos.max-geo-prefetch-con-conteo=2000

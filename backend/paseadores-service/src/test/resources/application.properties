spring.datasource.url=jdbc:h2:mem:paseadores;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.flyway.enabled=false

jwt.secret=patiperro-dev-secret-key-should-be-long-and-random-2026
jwt.expiration-ms=3600000

patiperro.paseadores.interno.secret=test-paseadores-interno-secret
patiperro.paseadores.verificacion-identidad.upload-dir=${java.io.tmpdir}/paseador-verificacion-test

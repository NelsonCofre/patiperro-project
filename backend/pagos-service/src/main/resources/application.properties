# =============================================================================
# pagos-service — paso 7: Mercado Pago, Checkout Pro, integración con reserva-service.
# Secretos/tokens: preferir variables de entorno en despliegue (no commitear prod).
# =============================================================================

spring.application.name=pagos-service
# Desarrollo local: perfil dev (create-drop). Producción: SPRING_PROFILES_ACTIVE=prod.
spring.profiles.active=dev
server.port=8087

spring.datasource.url=jdbc:postgresql://localhost:5432/pagos_db
spring.datasource.username=postgres
#root#
spring.datasource.password=12345
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# JWT (Checkout Pro tutor; mismo secreto HS256 que api-gateway en dev).
jwt.secret=${JWT_SECRET:patiperro-dev-secret-key-should-be-long-and-random-2026}

# Checkout Pro (flujo tutor): front y URL pública de notificación MP vía gateway.
patiperro.pagos.checkout.front-base-url=${CHECKOUT_FRONT_BASE_URL:http://localhost:5173}
patiperro.pagos.checkout.notification-url=${CHECKOUT_NOTIFICATION_PUBLIC_URL:http://localhost:8080/api/pagos/webhooks/mercadopago}

# Mercado Pago — API (payments, checkout/preferences, refunds). Credencial de prueba (misma app que Public Key Bricks).
patiperro.mercadopago.base-url=https://api.mercadopago.com
patiperro.mercadopago.access-token=APP_USR-6514616507944830-050513-11d4559886689fd290f65bee57f10ce3-3379090418
patiperro.mercadopago.connect-timeout-ms=5000
patiperro.mercadopago.read-timeout-ms=15000

# Reintentos API Mercado Pago — enlazadas vía MercadoPagoRetryProperties (override opcional por perfil)
patiperro.mercadopago.retry.max-attempts=3
patiperro.mercadopago.retry.initial-delay-ms=250
patiperro.mercadopago.retry.max-delay-ms=4000

# Checkout Pro — back_urls obligatorias (dominio/paths del React; dev típico Vite :5173).
# Sobrescribir por entorno: CHECKOUT_BACK_URL_SUCCESS, FAILURE, PENDING.
patiperro.mercadopago.checkout.back-url-success=${CHECKOUT_BACK_URL_SUCCESS:http://localhost:5173/tutor/reservas/pago/exito}
patiperro.mercadopago.checkout.back-url-failure=${CHECKOUT_BACK_URL_FAILURE:http://localhost:5173/tutor/reservas/pago/error}
patiperro.mercadopago.checkout.back-url-pending=${CHECKOUT_BACK_URL_PENDING:http://localhost:5173/tutor/reservas/pago/pendiente}
patiperro.mercadopago.checkout.auto-return=
# Opcional: URL pública del webhook MP para esta preferencia (si vacío, solo aplica lo configurado en panel MP / túnel).
patiperro.mercadopago.checkout.notification-url=${MERCADOPAGO_CHECKOUT_NOTIFICATION_URL:}
# true = respuesta JSON usa sandbox_init_point (token de prueba MP)
patiperro.mercadopago.checkout.use-sandbox=true


# Llamadas pagos-service → reserva-service (pago aprobado / no aprobado).
# interno.secret debe ser el MISMO valor que patiperro.reserva.interno.secret (RESERVA_INTERNO_SECRET).
patiperro.pagos.integracion.reserva.enabled=${PAGOS_INTEGRACION_RESERVA_ENABLED:true}
patiperro.pagos.integracion.reserva.base-url=${RESERVA_SERVICE_URL:http://localhost:8085}
patiperro.pagos.integracion.reserva.interno.secret=${RESERVA_INTERNO_SECRET:patiperro-reserva-interno-dev-2026}

# Cabecera X-Patiperro-Interno-Secret para /api/pagos/interno/** (reembolso, checkout preferencia).
# Debe coincidir con patiperro.reserva.integracion.pagos-reembolso.interno.secret (PAGOS_INTERNO_SECRET).
patiperro.pagos.interno.secret=${PAGOS_INTERNO_SECRET:patiperro-pagos-interno-dev-2026}

# --- Actuator / métricas (Prometheus en scrape o perfil prod) ---
management.endpoints.access.default=none
management.endpoint.health.access=read-only
management.endpoint.metrics.access=read-only
management.endpoint.prometheus.access=read-only
management.endpoints.web.exposure.include=health,metrics,prometheus
management.metrics.tags.application=${spring.application.name}
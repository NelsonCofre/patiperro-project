# =============================================================================
# pagos-service — paso 7: Mercado Pago, Checkout Pro, integración con reserva-service.
# Secretos/tokens: preferir variables de entorno en despliegue (no commitear prod).
# =============================================================================

spring.application.name=pagos-service
# Desarrollo local: perfil dev (create-drop). Producción: SPRING_PROFILES_ACTIVE=prod.
spring.profiles.active=dev
server.port=8087

spring.datasource.url=jdbc:postgresql://localhost:5432/pagos_db
spring.datasource.username=postgres
#root#
spring.datasource.password=1234
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# Flyway: desactivado por defecto (perfil dev usa Hibernate create-drop). Prod lo activa en application-prod.properties.
spring.flyway.enabled=false
spring.flyway.locations=classpath:db/migration

# Comisión plataforma sobre monto bruto (CLP): fracción entre 0 y 1 (0.05 = 5%). Usada en checkout estimado y en webhook approved.
patiperro.pagos.comision.plataforma-tasa=${PATI_COMISION_PLATAFORMA_TASA:0.05}

# Webhook MP: auditoría y advertencias (nunca abortan el flujo).
patiperro.pagos.webhook.log-approved-details=${PATI_WEBHOOK_LOG_APPROVED_DETAILS:true}
patiperro.pagos.webhook.warn-on-checkout-mp-amount-mismatch=${PATI_WEBHOOK_WARN_MP_AMOUNT_DIFF:true}
patiperro.pagos.webhook.amount-mismatch-tolerance-clp=${PATI_WEBHOOK_AMOUNT_TOLERANCE_CLP:1}
patiperro.pagos.webhook.warn-on-currency-mismatch=${PATI_WEBHOOK_WARN_CURRENCY:true}
patiperro.pagos.webhook.expected-currency-id=${PATI_WEBHOOK_EXPECTED_CURRENCY:CLP}

# JWT (Checkout Pro tutor; mismo secreto HS256 que api-gateway en dev).
jwt.secret=${JWT_SECRET:patiperro-dev-secret-key-should-be-long-and-random-2026}

# Checkout Pro (flujo tutor): front y URL pública de notificación MP vía gateway.
patiperro.pagos.checkout.front-base-url=${CHECKOUT_FRONT_BASE_URL:http://localhost:5173}
patiperro.pagos.checkout.notification-url=${CHECKOUT_NOTIFICATION_PUBLIC_URL:http://localhost:8080/api/pagos/webhooks/mercadopago}

# Mercado Pago — API (payments, checkout/preferences, refunds). Credencial de prueba (misma app que Public Key Bricks).
patiperro.mercadopago.base-url=https://api.mercadopago.com
patiperro.mercadopago.access-token=${MERCADOPAGO_ACCESS_TOKEN:APP_USR-6514616507944830-050513-11d4559886689fd290f65bee57f10ce3-3379090418}
patiperro.mercadopago.connect-timeout-ms=5000
patiperro.mercadopago.read-timeout-ms=15000

# Reintentos API Mercado Pago — enlazadas vía MercadoPagoRetryProperties (override opcional por perfil)
patiperro.mercadopago.retry.max-attempts=3
patiperro.mercadopago.retry.initial-delay-ms=250
patiperro.mercadopago.retry.max-delay-ms=4000

# Checkout Pro — back_urls obligatorias (dominio/paths del React; dev típico Vite :5173).
# Sobrescribir por entorno: CHECKOUT_BACK_URL_SUCCESS, FAILURE, PENDING.
patiperro.mercadopago.checkout.back-url-success=${CHECKOUT_BACK_URL_SUCCESS:http://localhost:5173/tutor/reservas/pago/exito}
patiperro.mercadopago.checkout.back-url-failure=${CHECKOUT_BACK_URL_FAILURE:http://localhost:5173/tutor/reservas/pago/error}
patiperro.mercadopago.checkout.back-url-pending=${CHECKOUT_BACK_URL_PENDING:http://localhost:5173/tutor/reservas/pago/pendiente}
patiperro.mercadopago.checkout.auto-return=
# Opcional: URL pública del webhook MP para esta preferencia (si vacío, solo aplica lo configurado en panel MP / túnel).
patiperro.mercadopago.checkout.notification-url=${MERCADOPAGO_CHECKOUT_NOTIFICATION_URL:}
# true = respuesta JSON usa sandbox_init_point (token de prueba MP)
patiperro.mercadopago.checkout.use-sandbox=true


# Llamadas pagos-service → reserva-service (pago aprobado / no aprobado).
# interno.secret debe ser el MISMO valor que patiperro.reserva.interno.secret (RESERVA_INTERNO_SECRET).
patiperro.pagos.integracion.reserva.enabled=${PAGOS_INTEGRACION_RESERVA_ENABLED:true}
#Originalmente era 8085#
patiperro.pagos.integracion.reserva.base-url=${RESERVA_SERVICE_URL:http://localhost:8090}
patiperro.pagos.integracion.reserva.interno.secret=${RESERVA_INTERNO_SECRET:patiperro-reserva-interno-dev-2026}
# Enriquecer ítems de GET /api/pagos/paseador/billetera (mascota, tutor, fecha bloque, estado reserva).
patiperro.pagos.integracion.reserva.billetera-detalles.enabled=${PAGOS_INTEGRACION_RESERVA_BILLETERA_DETALLES_ENABLED:true}

# Cabecera X-Patiperro-Interno-Secret para /api/pagos/interno/** (reembolso, checkout preferencia).
# Debe coincidir con patiperro.reserva.integracion.pagos-reembolso.interno.secret (PAGOS_INTERNO_SECRET).
patiperro.pagos.interno.secret=${PAGOS_INTERNO_SECRET:patiperro-pagos-interno-dev-2026}

# notification-service — correo HTML del resumen al tutor (POST /internal/pagos/resumen-comprobante-tutor).
# Secreto alineado con patiperro.notification.interno.secret (NOTIFICATION_INTERNO_SECRET).
patiperro.pagos.integracion.notification.enabled=${PAGOS_INTEGRACION_NOTIFICATION_ENABLED:false}
patiperro.pagos.integracion.notification.base-url=${PAGOS_INTEGRACION_NOTIFICATION_BASE_URL:http://localhost:8086}
patiperro.pagos.integracion.notification.interno.secret=${NOTIFICATION_INTERNO_SECRET:patiperro-notification-interno-dev-2026}
patiperro.pagos.integracion.notification.connect-timeout-ms=${PAGOS_INTEGRACION_NOTIFICATION_CONNECT_TIMEOUT_MS:5000}
patiperro.pagos.integracion.notification.read-timeout-ms=${PAGOS_INTEGRACION_NOTIFICATION_READ_TIMEOUT_MS:45000}
# Mismo tope que notification-service resumen-comprobante-tutor.max-html-chars (cualquiera de las env puede fijar el valor).
patiperro.pagos.integracion.notification.max-html-chars=${PAGOS_INTEGRACION_NOTIFICATION_MAX_HTML_CHARS:${NOTIFICATION_RESUMEN_COMPROBANTE_MAX_HTML_CHARS:200000}}

# Billetera paseador (N+2 desde fecha fin del paseo; zona para día calendario).
patiperro.pagos.billetera.zona=${PATI_BILLETERA_ZONA:America/Santiago}
# Máximo de filas en historialLiberacionesDisponible (GET billetera); acotado en código a [1, 500].
patiperro.pagos.billetera.historial-liberaciones-max=${PATI_BILLETERA_HISTORIAL_LIBERACIONES_MAX:100}
patiperro.pagos.billetera.liberacion.enabled=${PATI_BILLETERA_LIBERACION_ENABLED:true}
# Spring cron (seg min hora día mes día-semana): 0 0 0 * * * = medianoche cada día en liberacion.zone (alineado con N+2 por día calendario en billetera.zona).
# Sobrescribir con PATI_BILLETERA_LIBERACION_CRON si necesitás otro patrón (p. ej. pruebas más frecuentes u horario operativo distinto).
# liberacion.zone replica por defecto billetera.zona; usar PATI_BILLETERA_LIBERACION_ZONE solo si el job debe usar otro huso que el cálculo N+2 (evitar salvo necesidad).
patiperro.pagos.billetera.liberacion.cron=${PATI_BILLETERA_LIBERACION_CRON:0 0 0 * * *}
patiperro.pagos.billetera.liberacion.zone=${PATI_BILLETERA_LIBERACION_ZONE:${patiperro.pagos.billetera.zona}}
# Correo consolidado al paseador tras liberación (requiere notification + paseadores interno habilitados).
patiperro.pagos.billetera.liberacion.notificar-consolidado.enabled=${PATI_LIBERACION_NOTIFICAR_CONSOLIDADO:false}

# paseadores-service — correo interno por id (GET /api/paseadores/interno/{id}/correo); mismo secreto que patiperro.paseadores.interno.secret en paseadores-service.
patiperro.pagos.integracion.paseadores.enabled=${PAGOS_INTEGRACION_PASEADORES_ENABLED:false}
patiperro.pagos.integracion.paseadores.base-url=${PASEADORES_SERVICE_URL:http://localhost:8082}
patiperro.pagos.integracion.paseadores.interno.secret=${PASEADORES_INTERNO_SECRET:patiperro-paseadores-interno-dev-2026}
patiperro.pagos.integracion.paseadores.connect-timeout-ms=${PAGOS_INTEGRACION_PASEADORES_CONNECT_MS:3000}
patiperro.pagos.integracion.paseadores.read-timeout-ms=${PAGOS_INTEGRACION_PASEADORES_READ_MS:10000}

# Retiros paseador
patiperro.pagos.retiro.minimo=${PATI_RETIRO_MINIMO:1000.00}

# --- Actuator / métricas (Prometheus en scrape o perfil prod) ---
management.endpoints.access.default=none
management.endpoint.health.access=read-only
management.endpoint.metrics.access=read-only
management.endpoint.prometheus.access=read-only
management.endpoints.web.exposure.include=health,metrics,prometheus
management.metrics.tags.application=${spring.application.name}
spring.application.name=pagos-service
# Desarrollo local: perfil dev (create-drop). Producción: SPRING_PROFILES_ACTIVE=prod.
spring.profiles.active=dev
server.port=8087

spring.datasource.url=jdbc:postgresql://localhost:5432/pagos_db
spring.datasource.username=postgres
#root#
spring.datasource.password=12345
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# JWT tutor (mismo secreto que api-gateway).
jwt.secret=patiperro-dev-secret-key-should-be-long-and-random-2026

# Checkout Pro: front y notificación pública vía gateway.
patiperro.pagos.checkout.front-base-url=http://localhost:5173
patiperro.pagos.checkout.notification-url=http://localhost:8080/api/pagos/webhooks/mercadopago

# Mercado Pago (consulta GET /v1/payments/{id} tras webhook)
patiperro.mercadopago.base-url=https://api.mercadopago.com
# Requerido para que el webhook pueda confirmar el pago consultando la API de Mercado Pago.
# Access token de Mercado Pago (solo desarrollo local; no subir valor real a repositorios públicos).
patiperro.mercadopago.access-token=APP_USR-6091061160791848-042913-72cafe0f287d8e79058457f178132569-3367067955
patiperro.mercadopago.connect-timeout-ms=5000
patiperro.mercadopago.read-timeout-ms=15000
# true: usar sandbox_init_point en dev; false: init_point (producción).
patiperro.mercadopago.checkout-use-sandbox=true

# reserva-service — POST interno pago aprobado (mismo secreto que patiperro.reserva.interno.secret)
patiperro.pagos.integracion.reserva.enabled=true
patiperro.pagos.integracion.reserva.base-url=http://localhost:8085
patiperro.pagos.integracion.reserva.interno.secret=patiperro-reserva-interno-dev-2026

# Secreto para llamadas internas a este servicio (reembolso MP). Debe coincidir con el que envíe reserva-service.
patiperro.pagos.interno.secret=patiperro-pagos-interno-dev-2026

# --- Actuator / métricas (Prometheus en scrape o perfil prod) ---
management.endpoints.access.default=none
management.endpoint.health.access=read-only
management.endpoint.metrics.access=read-only
management.endpoint.prometheus.access=read-only
management.endpoints.web.exposure.include=health,metrics,prometheus
management.metrics.tags.application=${spring.application.name}
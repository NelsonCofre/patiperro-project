spring.application.name=pagos-service
server.port=8087

spring.datasource.url=jdbc:postgresql://localhost:5432/pagos_db
spring.datasource.username=postgres
#12345#
spring.datasource.password=12345
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# Mercado Pago (consulta GET /v1/payments/{id} tras webhook)
patiperro.mercadopago.base-url=https://api.mercadopago.com
# Requerido para que el webhook pueda confirmar el pago consultando la API de Mercado Pago.
# Ejemplo (sandbox): TEST-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx-xxxxxxxxx
patiperro.mercadopago.access-token=
patiperro.mercadopago.connect-timeout-ms=5000
patiperro.mercadopago.read-timeout-ms=15000

# reserva-service — POST interno pago aprobado (mismo secreto que patiperro.reserva.interno.secret)
patiperro.pagos.integracion.reserva.enabled=true
patiperro.pagos.integracion.reserva.base-url=http://localhost:8085
patiperro.pagos.integracion.reserva.interno.secret=patiperro-reserva-interno-dev-2026

# Perfil dev (activo por defecto): esquema generado por Hibernate; se elimina al parar el servicio.
spring.jpa.hibernate.ddl-auto=update
spring.flyway.enabled=false

# Liberación billetera: en dev cada minuto (Spring cron 6 campos: segundo minuto hora día mes día-semana). Prod: default diario en application.properties.
patiperro.pagos.billetera.liberacion.cron=0 * * * * *

# --- Túneles dev (regenerá si cambian ngrok / Cloudflare) ---
# Cloudflare → front (Vite): Checkout Pro arma back_urls desde esta base (MercadoPagoCheckoutProperties).
patiperro.mercadopago.checkout.public-front-base-url=https://addition-travel-remind-acre.trycloudflare.com
# ngrok → api-gateway :8080 (MP IPN / webhook).
patiperro.pagos.checkout.notification-url=https://postcard-carnival-aids.ngrok-free.dev/api/pagos/webhooks/mercadopago
patiperro.mercadopago.checkout.notification-url=https://postcard-carnival-aids.ngrok-free.dev/api/pagos/webhooks/mercadopago

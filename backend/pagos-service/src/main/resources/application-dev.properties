# Perfil dev (activo por defecto): esquema generado por Hibernate; se elimina al parar el servicio.
spring.jpa.hibernate.ddl-auto=create-drop
spring.flyway.enabled=false

# Liberación billetera: en dev ejecutar cada hora evita esperar a medianoche; prod usa default de application.properties (medianoche diaria).
patiperro.pagos.billetera.liberacion.cron=0 0 * * * *

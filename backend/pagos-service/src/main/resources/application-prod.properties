# Producción: sin DDL automático destructivo; esquema debe existir y alinearse con las entidades JPA.
spring.jpa.hibernate.ddl-auto=validate

# Flyway aplica solo scripts idempotentes (índices); baseline si la BD ya tenía tablas sin flyway_schema_history.
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Si la base es nueva y las tablas las crea otro proceso antes del primer arranque, seguir documentación de despliegue.
# Tablas core (billetera, transaccion, billetera_reserva_tracking, …) deben existir antes de validate.

# Billetera — liberación N+2 (heredado de application.properties): definir en despliegue para alinear negocio y JVM.
# PATI_BILLETERA_ZONA (p. ej. America/Santiago) — mismo criterio de día que BilleteraService.
# PATI_BILLETERA_LIBERACION_CRON — por defecto 00:00:01 diario; sobrescribir solo si política operativa lo exige.
# PATI_BILLETERA_LIBERACION_ZONE — opcional; si no se define, usa PATI_BILLETERA_ZONA.
# PATI_BILLETERA_LIBERACION_ENABLED — false solo en mantenimiento o entornos sin scheduler.

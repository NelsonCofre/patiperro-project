spring.application.name=agenda-service
server.port=8084

spring.datasource.url=jdbc:postgresql://localhost:5432/agenda_db
spring.datasource.username=postgres
#12345#
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

# Misma clave que api-gateway / tutores / paseadores (HS256).
jwt.secret=patiperro-dev-secret-key-should-be-long-and-random-2026

# URL del reserva-service (llamadas servidor-a-servidor).
patiperro.reserva-service.base-url=http://localhost:8085

# Debe coincidir con patiperro.reserva.interno.secret en reserva-service (cabecera X-Patiperro-Interno-Secret).
patiperro.agenda.reserva-interno.secret=${RESERVA_INTERNO_SECRET:patiperro-reserva-interno-dev-2026}

# Mismo valor que patiperro.reserva.agenda-interno.secret en reserva-service (endpoints internos agenda).
patiperro.agenda.interno.secret=patiperro-agenda-interno-dev-2026

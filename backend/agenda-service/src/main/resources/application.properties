spring.application.name=agenda-service
server.port=8084

spring.datasource.url=jdbc:postgresql://localhost:5432/agenda_db
spring.datasource.username=postgres
spring.datasource.password=1234
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

# Misma clave que api-gateway / tutores / paseadores (HS256).
jwt.secret=patiperro-dev-secret-key-should-be-long-and-random-2026

# URL del reserva-service (llamadas servidor-a-servidor; detrás del gateway suele ser 8080 si propagas rutas).
patiperro.reserva-service.base-url=http://localhost:8085

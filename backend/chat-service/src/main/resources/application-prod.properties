# Producción: SPRING_PROFILES_ACTIVE=prod. Secretos vía variables de entorno.

spring.datasource.url=${CHAT_DB_URL:jdbc:postgresql://localhost:5432/chat_db}
spring.datasource.username=${CHAT_DB_USER:postgres}
spring.datasource.password=${CHAT_DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

patiperro.chat.media.upload-dir=${CHAT_MEDIA_UPLOAD_DIR:/var/patiperro/chat-paseo}

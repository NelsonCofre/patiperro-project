# Producción: arrancar con SPRING_PROFILES_ACTIVE=prod (sobrescribe spring.profiles.active del fichero base).
# Definir secretos y URLs solo por variables de entorno; no commitear valores reales.
#
# Obligatorias en despliegue:
#   SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD
#   RESERVA_INTERNO_SECRET (mismo valor que reserva-service)
# Opcionales:
#   RESERVA_SERVICE_URL, NOTIFICATION_SERVICE_URL, CHAT_MEDIA_UPLOAD_DIR (ruta absoluta o volumen montado)
#   CHAT_INTEGRACION_NOTIFICATION_ENABLED=true + NOTIFICATION_INTERNO_SECRET si se usa Web Push

spring.sql.init.mode=never
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.flyway.enabled=false

# Datasource sin defaults de desarrollo (forzar entorno).
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Integraciones: sin secretos por defecto en prod.
patiperro.chat.integracion.reserva.interno.secret=${RESERVA_INTERNO_SECRET}
patiperro.chat.integracion.notification.interno.secret=${NOTIFICATION_INTERNO_SECRET}

management.endpoints.web.exposure.include=health,metrics,prometheus
management.endpoint.health.probes.enabled=true
management.metrics.tags.application=${spring.application.name}

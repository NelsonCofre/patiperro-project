# Perfil dev (activo por defecto vía spring.profiles.active=dev en application.properties).
# Credenciales JDBC: application.properties (mismo patrón que reserva-service).
# Tras clonar: ejecutar db/chat_db-init.sql y, si la BD ya existía, db/chat_db-mensaje-imagen-migration.sql.

# Esquema: Hibernate update (no borra datos). En prod usar validate + migraciones controladas.
spring.jpa.hibernate.ddl-auto=update
spring.flyway.enabled=false
spring.sql.init.mode=never

spring.jpa.show-sql=false

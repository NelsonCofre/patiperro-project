spring.application.name=chat-service
server.port=8089


spring.datasource.url=jdbc:postgresql://localhost:5432/chat_db
spring.datasource.username=postgres
#root#
spring.datasource.password=root

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# --- Integración reserva-service (participantes para push) ---
# RESERVA_INTERNO_SECRET debe coincidir con reserva-service.
patiperro.chat.integracion.reserva.enabled=${CHAT_INTEGRACION_RESERVA_ENABLED:true}
patiperro.chat.integracion.reserva.base-url=${CHAT_INTEGRACION_RESERVA_BASE_URL:http://localhost:8090}
patiperro.chat.integracion.reserva.interno.secret=${RESERVA_INTERNO_SECRET:patiperro-reserva-interno-dev-2026}
patiperro.chat.integracion.reserva.connect-timeout-ms=${CHAT_INTEGRACION_RESERVA_CONNECT_TIMEOUT_MS:5000}
patiperro.chat.integracion.reserva.read-timeout-ms=${CHAT_INTEGRACION_RESERVA_READ_TIMEOUT_MS:10000}

# --- Integración notification-service (Web Push del chat); deshabilitado por defecto ---
# Misma convención que patiperro.pagos.integracion.notification.* en pagos-service.
# NOTIFICATION_INTERNO_SECRET — alineado con patiperro.notification.interno.secret (notification-service).
# Local: CHAT_INTEGRACION_NOTIFICATION_ENABLED=true; en notification-service: NOTIFICATION_WEBPUSH_ENABLED=true y VAPID_*.
patiperro.chat.integracion.notification.enabled=${CHAT_INTEGRACION_NOTIFICATION_ENABLED:false}
patiperro.chat.integracion.notification.base-url=${CHAT_INTEGRACION_NOTIFICATION_BASE_URL:http://localhost:8086}
patiperro.chat.integracion.notification.interno.secret=${NOTIFICATION_INTERNO_SECRET:patiperro-notification-interno-dev-2026}
patiperro.chat.integracion.notification.connect-timeout-ms=${CHAT_INTEGRACION_NOTIFICATION_CONNECT_TIMEOUT_MS:5000}
patiperro.chat.integracion.notification.read-timeout-ms=${CHAT_INTEGRACION_NOTIFICATION_READ_TIMEOUT_MS:10000}

# =============================================================================
# chat-service — Mensajería y fotos del paseo (paso 13 del modelo).
# Desarrollo local: perfil dev (application-dev.properties).
# Producción: SPRING_PROFILES_ACTIVE=prod (application-prod.properties).
# =============================================================================

spring.application.name=chat-service
spring.profiles.active=dev
server.port=${CHAT_SERVICE_PORT:8089}

# --- Base de datos (chat_db; en prod application-prod.properties sobrescribe con variables de entorno) ---
spring.datasource.url=jdbc:postgresql://localhost:5432/chat_db
spring.datasource.username=postgres
#root#
spring.datasource.password=1234
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# --- Multipart (alineado con patiperro.chat.media.max-bytes = 10 MB) ---
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=11MB

# --- Almacenamiento local de imágenes del paseo ---
patiperro.chat.media.upload-dir=${CHAT_MEDIA_UPLOAD_DIR:uploads/chat-paseo}
patiperro.chat.media.max-bytes=${CHAT_MEDIA_MAX_BYTES:10485760}

# --- Integración reserva-service (validar EN_CURSO y participantes al subir foto) ---
# RESERVA_INTERNO_SECRET debe coincidir con patiperro.reserva.interno.secret en reserva-service.
patiperro.chat.integracion.reserva.enabled=${CHAT_INTEGRACION_RESERVA_ENABLED:true}
patiperro.chat.integracion.reserva.base-url=${RESERVA_SERVICE_URL:http://localhost:8090}
patiperro.chat.integracion.reserva.interno.secret=${RESERVA_INTERNO_SECRET:patiperro-reserva-interno-dev-2026}
patiperro.chat.integracion.reserva.connect-timeout-ms=${CHAT_INTEGRACION_RESERVA_CONNECT_TIMEOUT_MS:5000}
patiperro.chat.integracion.reserva.read-timeout-ms=${CHAT_INTEGRACION_RESERVA_READ_TIMEOUT_MS:10000}

# --- Integración notification-service (Web Push al recibir mensaje; desactivado por defecto) ---
# NOTIFICATION_INTERNO_SECRET alineado con patiperro.notification.interno.secret.
patiperro.chat.integracion.notification.enabled=${CHAT_INTEGRACION_NOTIFICATION_ENABLED:false}
patiperro.chat.integracion.notification.base-url=${NOTIFICATION_SERVICE_URL:http://localhost:8086}
patiperro.chat.integracion.notification.interno.secret=${NOTIFICATION_INTERNO_SECRET:patiperro-notification-interno-dev-2026}
patiperro.chat.integracion.notification.connect-timeout-ms=${CHAT_INTEGRACION_NOTIFICATION_CONNECT_TIMEOUT_MS:5000}
patiperro.chat.integracion.notification.read-timeout-ms=${CHAT_INTEGRACION_NOTIFICATION_READ_TIMEOUT_MS:10000}

# --- Actuator (mínimo en base; prod amplía en application-prod.properties) ---
management.endpoints.web.exposure.include=health

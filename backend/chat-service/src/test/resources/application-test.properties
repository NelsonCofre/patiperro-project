# Perfil test (@ActiveProfiles("test")) — H2 en memoria, sin integraciones externas.

spring.datasource.url=jdbc:h2:mem:chattest;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.sql.init.mode=never

patiperro.chat.integracion.reserva.enabled=false
patiperro.chat.integracion.notification.enabled=false

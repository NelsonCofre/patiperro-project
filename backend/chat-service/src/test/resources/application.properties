spring.datasource.url=jdbc:h2:mem:chat;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.flyway.enabled=false

patiperro.chat.integracion.reserva.enabled=false
patiperro.chat.integracion.notification.enabled=false
patiperro.chat.media.upload-dir=${java.io.tmpdir}/chat-media-test

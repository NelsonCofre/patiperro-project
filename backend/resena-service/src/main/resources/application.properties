# =============================================================================
# resena-service — reseñas (puerto alineado con api-gateway RESENA_SERVICE_URI :8088)
# =============================================================================

spring.application.name=resena-service
spring.profiles.active=dev
server.port=8088

# Base de datos local usada por resena-service.
spring.datasource.url=jdbc:postgresql://localhost:5432/resenas_db
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

logging.level.com.patiperro.resena=INFO

spring.application.name=resena-service
spring.profiles.active=dev
server.port=8088

# Base de datos local usada por resena-service.
# Se mantiene la BD actual observada en el proyecto para no introducir un cambio
# de infraestructura implícito junto con la corrección de puertos.
spring.datasource.url=jdbc:postgresql://localhost:5432/resenas_db
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
